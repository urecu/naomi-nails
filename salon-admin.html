<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naomi Pro · Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#141414;--bg2:#1E1E1E;--bg3:#2A2A2A;--rose:#C4788A;--rose-light:rgba(196,120,138,0.15);--rose-border:rgba(196,120,138,0.3);--text:#F0F0F0;--text2:#A0A0A0;--border:#2E2E2E;--green:#4CAF7D;--green-light:rgba(76,175,125,0.2);--red:#E57373;--red-light:rgba(229,115,115,0.15);--amber:#F5A623;--amber-light:rgba(245,166,35,0.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body.modal-open{overflow:hidden;width:100%}
.page{display:none}.page.active{display:block}
.auth-wrap{max-width:400px;margin:0 auto;padding:3rem 1.5rem}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--text)}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:16px;color:var(--text);background:var(--bg2);margin-bottom:1rem;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--rose)}
textarea{height:70px;resize:none}
.btn{display:block;width:100%;padding:13px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;text-align:center;margin-top:0.5rem;font-family:inherit}
.btn:hover{opacity:0.85}.btn:disabled{opacity:0.4;cursor:default}
.btn-sm{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit;display:inline-block}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text);margin-top:8px}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(229,115,115,0.3)}
.btn-success{background:var(--green-light);color:var(--green);border:1px solid rgba(76,175,125,0.3)}
.btn-amber{background:var(--amber-light);color:var(--amber);border:1px solid rgba(245,166,35,0.3)}
.error-msg{background:var(--red-light);color:var(--red);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:1rem}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--text)}
.header-logo span{color:var(--rose)}
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;display:none}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:201;transition:left 0.3s;padding:2rem 1.25rem;display:flex;flex-direction:column}
.sidebar.open{left:0}
.sidebar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--text);margin-bottom:2rem}
.sidebar-logo span{color:var(--rose)}
.sidebar-menu{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:15px;font-family:inherit;background:none;border:none;text-align:left;width:100%}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--rose-light);color:var(--rose)}
.sidebar-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;align-self:flex-end;margin-bottom:1rem}
.logout-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.content{padding:1.25rem;max-width:600px;margin:0 auto;width:100%;padding-bottom:4rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:500;color:var(--text)}
.stat-sub{font-size:12px;color:var(--rose);margin-top:2px}
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.prog-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.prog-name{font-size:15px;font-weight:500;color:var(--text)}
.prog-detail{font-size:13px;color:var(--text2);line-height:1.7}
.prog-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge.asteptare{background:var(--amber-light);color:var(--amber)}
.badge.confirmat{background:var(--green-light);color:var(--green)}
.badge.anulat{background:var(--red-light);color:var(--red)}
.badge.done{background:rgba(100,100,100,0.15);color:#888;cursor:pointer}
/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--rose);color:#fff;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(196,120,138,0.4);z-index:90}
.fab-green{background:var(--green);box-shadow:0 4px 16px rgba(76,175,125,0.4)}
.fab-menu{position:fixed;bottom:90px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:90}
.fab-item{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.fab-item-label{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text);cursor:pointer}
.fab-item-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
/* CALENDAR WEEK STRIP */
.cal-top-bar{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:50}
.cal-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.cal-month-btn{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--text);background:none;border:none;cursor:pointer;padding:0}
.cal-month-btn:hover{color:var(--rose)}
.cal-week-nav{display:flex;gap:8px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:16px;cursor:pointer;padding:4px 12px;line-height:1}
.cal-week-strip{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 16px 10px}
.cal-week-day{text-align:center;cursor:pointer;border-radius:10px;padding:5px 2px}
.cal-week-day:hover{background:var(--bg3)}
.cal-week-day.active{background:var(--rose)}
.cal-week-day .wday-name{font-size:11px;color:var(--text2);text-transform:uppercase}
.cal-week-day.active .wday-name{color:rgba(255,255,255,0.8)}
.cal-week-day .wday-num{font-size:17px;font-weight:500;color:var(--text);margin-top:2px}
.cal-week-day.active .wday-num{color:#fff}
.cal-week-day.today .wday-num{color:var(--rose)}
.cal-week-day.active.today .wday-num{color:#fff}
/* FULL MONTH PICKER */
.month-picker-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.month-picker{background:var(--bg2);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:500px}
.month-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.month-picker-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text)}
.mp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mp-label{text-align:center;font-size:11px;color:var(--text2);padding:4px 0}
.mp-day{text-align:center;padding:8px 2px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text)}
.mp-day:hover:not(.mp-dis){background:var(--bg3)}
.mp-day.mp-sel{background:var(--rose);color:#fff}
.mp-day.mp-tod:not(.mp-sel){color:var(--rose);font-weight:600}
.mp-day.mp-dis{color:var(--border);cursor:default}
.mp-day.mp-empty{cursor:default}
/* DAY VIEW */
.day-view-label{padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.day-view-label p{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text)}
.day-view{overflow-y:auto}
.day-view-inner{position:relative}
.hour-bg{position:absolute;left:0;right:0;border-bottom:1px solid var(--border)}
.hour-lbl{position:absolute;left:4px;font-size:11px;color:var(--text2);top:4px}
.cal-event{position:absolute;border-radius:7px;padding:4px 7px;cursor:pointer;overflow:hidden}
.cal-event.confirmat{background:rgba(76,175,125,0.22);border-left:3px solid var(--green)}
.cal-event.asteptare{background:rgba(245,166,35,0.18);border-left:3px solid var(--amber)}
.cal-event.blocat{background:rgba(229,115,115,0.18);border-left:3px solid var(--red)}
.ev-time{font-size:10px;color:var(--text2)}
.ev-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-svc{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* OVERLAY */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:999;overflow:hidden}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem;max-width:500px;width:100%;max-height:88vh;overflow-y:auto;overflow-x:hidden}
.modal-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1rem}
.msg-box{background:var(--green-light);border-radius:10px;padding:1rem;font-size:14px;color:var(--green);line-height:1.7;margin-bottom:1rem;white-space:pre-line}
.copy-btn{display:block;width:100%;padding:10px;background:var(--rose-light);border:1px solid var(--rose-border);color:var(--rose);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px;font-family:inherit}
.close-modal-btn{display:block;width:100%;padding:10px;background:var(--bg3);border:none;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit}
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.client-card:hover{border-color:var(--rose)}
.client-avatar{width:44px;height:44px;border-radius:50%;background:var(--rose-light);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--rose);flex-shrink:0;overflow:hidden}
.search-results-adm{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-top:-12px;margin-bottom:1rem;overflow:hidden;max-height:200px;overflow-y:auto}
.search-result-item{padding:10px 12px;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.search-result-item:hover{background:var(--bg3)}
.client-badge{background:var(--rose-light);border:1px solid var(--rose-border);border-radius:8px;padding:10px 12px;margin-bottom:1rem;font-size:14px;color:var(--rose)}
.report-row{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid var(--border);color:var(--text)}
.report-row:last-child{border-bottom:none}
.report-row span:first-child{color:var(--text2)}
.loading-txt{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
h2{font-size:17px;font-weight:500;color:var(--text);margin-bottom:1rem}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filters select{margin-bottom:0;flex:1;min-width:100px}
.notif-popup{position:fixed;top:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:12px 16px;z-index:600;max-width:320px;width:90%;animation:sld 0.3s ease}
@keyframes sld{from{opacity:0;top:60px}to{opacity:1;top:80px}}
.notif-ok{background:#0A2A1E;border:1px solid var(--green);color:var(--green)}
.notif-warn{background:#2A1E0A;border:1px solid var(--amber);color:var(--amber)}
.chelt-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.chelt-card .chelt-name{font-size:14px;color:var(--text)}
.chelt-card .chelt-meta{font-size:12px;color:var(--text2);margin-top:2px}
.chelt-card .chelt-sum{font-size:15px;font-weight:500;color:var(--red)}
</style>
</head>
<body>

<div class="page active" id="pauth">
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Naomi <span style="color:var(--rose)">Pro</span></h1>
      <p>Panou de administrare</p>
    </div>
    <label>Email</label><input type="email" id="auth-email" placeholder="email admin" autocomplete="email">
    <label>Parolă</label><input type="password" id="auth-pass" placeholder="parolă" autocomplete="current-password">
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <button class="btn" onclick="doLogin()">Intră</button>
  </div>
</div>

<div class="page" id="pdash">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    <div class="sidebar-logo">Naomi <span>Pro</span></div>
    <div class="sidebar-menu">
      <button class="sidebar-item active" id="si-home" onclick="showTab('home')">Home</button>
      <button class="sidebar-item" id="si-calendar" onclick="showTab('calendar')">Calendar</button>
      <button class="sidebar-item" id="si-programari" onclick="showTab('programari')">Programări</button>
      <button class="sidebar-item" id="si-clienti" onclick="showTab('clienti')">Clienți</button>
      <button class="sidebar-item" id="si-rapoarte" onclick="showTab('rapoarte')">Rapoarte</button>
    </div>
    <button class="logout-btn" onclick="doLogout()" style="margin-top:auto">Ieși din cont</button>
  </div>

  <div class="admin-header">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <div class="header-logo">Naomi <span>Pro</span></div>
    <div style="width:40px"></div>
  </div>

  <div class="content">
    <!-- HOME -->
    <div id="tab-home" class="tab-content">
      <div class="stats-grid" id="stats-grid"></div>
      <h2>Programări azi</h2><div id="azi-list"></div>
      <h2 style="margin-top:1.5rem">Mâine</h2><div id="maine-list"></div>
    </div>

    <!-- CALENDAR -->
    <div id="tab-calendar" class="tab-content" style="display:none;padding:0">
      <div class="cal-top-bar">
        <div class="cal-week-header">
          <button class="cal-month-btn" id="cal-month-btn" onclick="openMonthPicker()"></button>
          <div class="cal-week-nav">
            <button class="cal-nav-btn" onclick="prevWeek()">&#8249;</button>
            <button class="cal-nav-btn" onclick="nextWeek()">&#8250;</button>
          </div>
        </div>
        <div class="cal-week-strip" id="cal-week-strip"></div>
      </div>
      <div class="day-view-label"><p id="cal-day-label"></p></div>
      <div class="day-view" id="day-view" style="height:calc(100vh - 230px)"></div>
      <div id="cal-fab-menu" style="display:none" class="fab-menu">
        <div class="fab-item" onclick="openAddProgModal()">
          <span class="fab-item-label">Adaugă programare</span>
          <div class="fab-item-btn" style="background:var(--green);color:#fff">+</div>
        </div>
        <div class="fab-item" onclick="openBlocareModal()">
          <span class="fab-item-label">Blochează timp</span>
          <div class="fab-item-btn" style="background:var(--amber);color:#fff">🔒</div>
        </div>
      </div>
      <button class="fab" id="cal-fab" onclick="toggleCalFab()">+</button>
    </div>

    <!-- PROGRAMARI -->
    <div id="tab-programari" class="tab-content" style="display:none">
      <div class="filters">
        <select id="filt-status" onchange="loadProgramari()">
          <option value="toate">Toate</option>
          <option value="in_asteptare">Așteptare</option>
          <option value="confirmat">Confirmate</option>
          <option value="anulat">Anulate</option>
        </select>
        <select id="filt-period" onchange="loadProgramari()">
          <option value="viitoare">Viitoare</option>
          <option value="azi">Azi</option>
          <option value="maine">Mâine</option>
          <option value="saptamana">Săptămâna</option>
          <option value="luna">Luna</option>
          <option value="toate">Toate</option>
        </select>
      </div>
      <div id="prog-list"></div>
      <button class="fab fab-green" onclick="openAddProgModal()">+</button>
    </div>

    <!-- CLIENTI -->
    <div id="tab-clienti" class="tab-content" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:1rem">
        <input style="margin-bottom:0;flex:1" type="text" id="client-filter-input" placeholder="Caută după nume sau telefon..." oninput="filterClientList()">
        <button class="btn-sm btn-success" style="flex-shrink:0;padding:10px 14px;font-size:13px" onclick="openAddClientModal()">+ Client</button>
      </div>
      <div id="client-count" style="font-size:12px;color:var(--text2);margin-bottom:12px"></div>
      <div id="client-list"></div>
    </div>

    <!-- RAPOARTE -->
    <div id="tab-rapoarte" class="tab-content" style="display:none">
      <!-- Filtru perioada -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem">
        <div class="filters" style="margin-bottom:10px">
          <select id="rep-period" onchange="onPeriodChange()" style="margin-bottom:0;flex:1">
            <option value="azi">Azi</option>
            <option value="saptamana">Săptămâna aceasta</option>
            <option value="luna" selected>Luna aceasta</option>
            <option value="luna-trecuta">Luna trecută</option>
            <option value="an">Anul acesta</option>
            <option value="custom">Interval personalizat</option>
            <option value="toate">Toate timpurile</option>
          </select>
          <button class="btn-sm btn-success" onclick="exportExcel()" style="padding:10px 14px;flex-shrink:0">Export</button>
        </div>
        <div id="custom-range" style="display:none;display:none">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="flex:1"><label style="margin-bottom:4px">De la</label><input type="date" id="rep-start" style="margin-bottom:0" onchange="loadRapoarte()"></div>
            <div style="flex:1"><label style="margin-bottom:4px">Până la</label><input type="date" id="rep-end" style="margin-bottom:0" onchange="loadRapoarte()"></div>
          </div>
        </div>
      </div>

      <!-- SUMAR FINANCIAR -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem">
        <h2 style="font-size:15px;margin-bottom:1rem">Sumar financiar</h2>
        <div class="stats-grid" id="rep-stats"></div>
        <div id="rep-profit-box"></div>
      </div>

      <!-- TIPS -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem">
        <h2 style="font-size:15px;margin-bottom:1rem">Tips</h2>
        <div id="rep-tips"></div>
      </div>

      <!-- CHELTUIELI VARIABILE -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin-bottom:0;font-size:15px">Cheltuieli variabile</h2>
          <button class="btn-sm btn-danger" onclick="openAddChelt()">+ Adaugă</button>
        </div>
        <div id="chelt-list"></div>
        <div id="chelt-total" style="margin-top:8px;font-size:13px;color:var(--text2)"></div>
      </div>

      <!-- CHELTUIELI FIXE -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin-bottom:0;font-size:15px">Cheltuieli fixe lunare</h2>

  const now=new Date();const todayKey=dk(now);const tom=new Date();tom.setDate(tom.getDate()+1);
  if(period==='azi')q=q.eq('data',todayKey);
  else if(period==='maine')q=q.eq('data',dk(tom));
  else if(period==='viitoare')q=q.gte('data',todayKey);
  else if(period==='saptamana'){const mon=getMonday(now);const sun=new Date(mon);sun.setDate(sun.getDate()+6);q=q.gte('data',dk(mon)).lte('data',dk(sun));}

  const endDateTime=new Date(p.data+'T'+addM(p.ora,parseFloat(p.durata)*60)+':00');

}

  const bt=done?'Done':p.status==='confirmat'?'Confirmat':p.status==='anulat'?'Anulat':'Așteptare';
  const et=addM(p.ora,parseFloat(p.durata)*60);
  return`<div class="prog-card">
    <div class="prog-header"><div class="prog-name">${p.nume}</div>
      <span class="badge ${bc}" ${done?`onclick="addTips('${p.id}',${p.tips||0})" style="cursor:pointer" title="Apasă pentru tips"`:''}>

      </span>
    </div>

      ${p.status==='in_asteptare'?`<button class="btn-sm btn-success" onclick="confirmProg('${p.id}','${p.nume}','${p.data}','${p.ora}','${p.telefon}')">Confirmă</button>`:''}
      ${p.status!=='anulat'&&!done?`<button class="btn-sm btn-danger" onclick="cancelProg('${p.id}')">Anulează</button>`:''}
      ${p.status==='confirmat'&&!done?`<button class="btn-sm btn-amber" onclick="showReminderMsg('${p.nume}','${p.data}','${p.ora}','${p.telefon}')">Reminder</button>`:''}

}

function loadCalendar(){

function getWeekDates(weekStart){
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);dates.push(d);}
  return dates;
}

function prevWeek(){calWeekStart.setDate(calWeekStart.getDate()-7);renderWeekStrip();renderDayView();}
function nextWeek(){calWeekStart.setDate(calWeekStart.getDate()+7);renderWeekStrip();renderDayView();}

function renderWeekStrip(){
  const dates=getWeekDates(calWeekStart);
  const todayKey=dk(new Date());
  const selKey=dk(calSelectedDate);
  // Update month label
  const firstDay=dates[0];const lastDay=dates[6];
  let label=MONTHS[firstDay.getMonth()]+' '+firstDay.getFullYear();
  if(firstDay.getMonth()!==lastDay.getMonth())label=MONTHS[firstDay.getMonth()]+' – '+MONTHS[lastDay.getMonth()]+' '+lastDay.getFullYear();
  document.getElementById('cal-month-btn').textContent=label+' ▾';
  // Render days
  document.getElementById('cal-week-strip').innerHTML=dates.map(d=>{
    const dkey=dk(d);const dayIdx=d.getDay()===0?6:d.getDay()-1;
    let cls='cal-week-day';
    if(dkey===selKey)cls+=' active';
    if(dkey===todayKey)cls+=' today';
    return`<div class="${cls}" onclick="selectWeekDay('${dkey}')"><div class="wday-name">${DS[dayIdx]}</div><div class="wday-num">${d.getDate()}</div></div>`;
  }).join('');
}

function renderMonthPicker(){
  const existing=document.getElementById('month-picker-overlay');
  if(existing)existing.remove();
  const o=document.createElement('div');o.className='month-picker-overlay';o.id='month-picker-overlay';
  const todayKey=dk(new Date());const selKey=dk(calSelectedDate);
  let html=`<div class="month-picker">
    <div class="month-picker-header">
      <button style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer" onclick="mpPrevMonth()">&#8249;</button>
      <span class="month-picker-title">${MONTHS[mpMonth]} ${mpYear}</span>
      <button style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer" onclick="mpNextMonth()">&#8250;</button>
    </div>
    <div class="mp-grid">${DS.map(d=>`<div class="mp-label">${d}</div>`).join('')}`;
  const first=new Date(mpYear,mpMonth,1);
  let sd=first.getDay()-1;if(sd<0)sd=6;
  const dim=new Date(mpYear,mpMonth+1,0).getDate();
  for(let i=0;i<sd;i++)html+=`<div class="mp-day mp-empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(mpYear,mpMonth,d);const dateKey=dk(date);
    const isSun=date.getDay()===0;
    let cls='mp-day';
    if(isSun)cls+=' mp-dis';
    if(dateKey===selKey)cls+=' mp-sel';
    if(dateKey===todayKey&&dateKey!==selKey)cls+=' mp-tod';
    html+=`<div class="${cls}" ${isSun?'':` onclick="mpSelectDay(${mpYear},${mpMonth},${d})"`}>${d}</div>`;
  }
  html+=`</div><button class="close-modal-btn" style="margin-top:1rem" onclick="document.getElementById('month-picker-overlay').remove()">Închide</button></div>`;
  o.innerHTML=html;
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
}

function mpPrevMonth(){if(mpMonth===0){mpMonth=11;mpYear--;}else mpMonth--;renderMonthPicker();}
function mpNextMonth(){if(mpMonth===11){mpMonth=0;mpYear++;}else mpMonth++;renderMonthPicker();}
function mpSelectDay(y,m,d){

  document.getElementById('month-picker-overlay')?.remove();

// DAY VIEW - cu layout pentru suprapuneri
async function renderDayView(){
  const dateKey=dk(calSelectedDate);
  document.getElementById('cal-day-label').textContent=friendlyDate(dateKey);
  const{data:prog}=await sb.from('programari').select('*').eq('data',dateKey).neq('status','anulat').order('ora');
  const{data:blocari}=await sb.from('blocari').select('*').eq('data',dateKey);
  const dayView=document.getElementById('day-view');
  const totalMins=(CAL_END-CAL_START)*60;
  const totalH=totalMins*PX_MIN;

  // Build events list
  const events=[];
  (prog||[]).forEach(p=>{
    events.push({type:'prog',id:p.id,startM:t2m(p.ora),endM:t2m(p.ora)+parseFloat(p.durata)*60,data:p});
  });
  (blocari||[]).forEach(b=>{
    events.push({type:'blocare',id:b.id,startM:t2m(b.ora_start),endM:t2m(b.ora_end),data:b});
  });

  // Calculate columns for overlapping events
  const cols=[];
  events.forEach(ev=>{
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const lastInCol=cols[c][cols[c].length-1];
      if(ev.startM>=lastInCol.endM){cols[c].push(ev);ev.col=c;placed=true;break;}
    }
    if(!placed){ev.col=cols.length;cols.push([ev]);}
  });

  // Find max overlapping columns
  events.forEach(ev=>{
    let maxCols=1;
    events.forEach(ev2=>{
      if(ev2!==ev&&ev2.startM<ev.endM&&ev2.endM>ev.startM)maxCols=Math.max(maxCols,ev2.col+1);
    });
    ev.totalCols=Math.max(ev.col+1,maxCols);
  });

  let html=`<div style="position:relative;height:${totalH}px">`;
  // Hour backgrounds
  for(let h=CAL_START;h<=CAL_END;h++){
    const top=(h-CAL_START)*60*PX_MIN;
    html+=`<div class="hour-bg" style="top:${top}px;height:${60*PX_MIN}px"><span class="hour-lbl">${String(h).padStart(2,'0')}:00</span></div>`;
  }
  // Events
  const COL_LEFT=44;
  events.forEach(ev=>{
    const top=(ev.startM-CAL_START*60)*PX_MIN;
    const height=Math.max((ev.endM-ev.startM)*PX_MIN,30);
    const avW=`calc(100% - ${COL_LEFT+4}px)`;
    const colW=100/ev.totalCols;
    const left=`calc(${COL_LEFT}px + ${ev.col*colW}% * (100% - ${COL_LEFT}px) / 100%)`;
    const width=`calc(${colW}% - 4px)`;

    if(ev.type==='prog'){
      const p=ev.data;const et=addM(p.ora,parseFloat(p.durata)*60);
      const cls=p.status==='confirmat'?'confirmat':'asteptare';
      html+=`<div class="cal-event ${cls}" style="top:${top}px;height:${height}px;left:calc(${COL_LEFT}px + ${ev.col}*(100% - ${COL_LEFT}px)/${ev.totalCols});width:calc((100% - ${COL_LEFT}px)/${ev.totalCols} - 4px)" onclick="showProgDetailCal('${p.id}','${p.telefon}','${encodeURIComponent(p.nume)}','${p.data}','${p.ora}','${p.status}')">
        <div class="ev-time">${p.ora} – ${et}</div>
        <div class="ev-name">${p.nume}</div>
        <div class="ev-svc">${p.serviciu}</div>
      </div>`;
    } else {
      const b=ev.data;
      html+=`<div class="cal-event blocat" style="top:${top}px;height:${height}px;left:calc(${COL_LEFT}px + ${ev.col}*(100% - ${COL_LEFT}px)/${ev.totalCols});width:calc((100% - ${COL_LEFT}px)/${ev.totalCols} - 4px)" onclick="showBlocareDetail('${b.id}','${encodeURIComponent(b.motiv||'Blocat')}','${b.ora_start}','${b.ora_end}')">
        <div class="ev-time">${b.ora_start} – ${b.ora_end}</div>
        <div class="ev-name" style="color:var(--red)">${b.motiv||'Blocat'}</div>
      </div>`;
    }
  });
  html+=`</div>`;
  dayView.innerHTML=html;
  setTimeout(()=>{dayView.scrollTop=(10-CAL_START)*60*PX_MIN-20;},50);
}

function showBlocareDetail(id,motivEnc,start,end){

// PERIOD CHANGE
function onPeriodChange(){
  const period=document.getElementById('rep-period').value;
  const customDiv=document.getElementById('custom-range');
  if(period==='custom'){
    customDiv.style.display='block';
    const now=new Date();
    document.getElementById('rep-start').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    document.getElementById('rep-end').value=dk(now);
  } else {
    customDiv.style.display='none';
    loadRapoarte();
    loadCheltuieli();
    loadCheltuieliFixe();
  }
}

function getRepDates(){
  const period=document.getElementById('rep-period').value;
  const now=new Date();
  let s,e;
  if(period==='azi'){s=new Date(now.getFullYear(),now.getMonth(),now.getDate());e=new Date(s);}
  else if(period==='saptamana'){s=getMonday(now);e=new Date(s);e.setDate(e.getDate()+6);}
  else if(period==='luna'){s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='luna-trecuta'){s=new Date(now.getFullYear(),now.getMonth()-1,1);e=new Date(now.getFullYear(),now.getMonth(),0);}
  else if(period==='an'){s=new Date(now.getFullYear(),0,1);e=new Date(now.getFullYear(),11,31);}
  else if(period==='custom'){
    const sv=document.getElementById('rep-start').value;
    const ev=document.getElementById('rep-end').value;
    if(!sv||!ev)return null;
    s=new Date(sv+'T12:00:00');e=new Date(ev+'T12:00:00');
  }
  else{s=new Date('2020-01-01');e=new Date('2099-12-31');}
  return{s,e};
}

async function submitCheltFixa(){
  const den=document.getElementById('cf-den').value.trim();
  const sum=parseFloat(document.getElementById('cf-sum').value);
  if(!den||isNaN(sum)){alert('Completează toate câmpurile.');return;}
  const{error}=await sb.from('cheltuieli_fixe').insert({denumire:den,suma:sum,activa:true});
  if(error){alert('Eroare: '+error.message);return;}
  document.getElementById('chelt-fixa-overlay').remove();
  showNotif('Cheltuială fixă salvată!','ok');
  loadCheltuieliFixe();updateProfit();
}

async function updateProfit(){
  // recalculate profit box
  const dates=getRepDates();if(!dates)return;
  const{s,e}=dates;
  const{data:prog}=await sb.from('programari').select('pret,tips').eq('status','confirmat').gte('data',dk(s)).lte('data',dk(e));
  const incasari=(prog||[]).reduce((acc,p)=>acc+p.pret,0);
  const tips=(prog||[]).reduce((acc,p)=>acc+(p.tips||0),0);
  
  let cheltVar=0;
  try{const{data:chv}=await sb.from('cheltuieli').select('suma').gte('data',dk(s)).lte('data',dk(e));cheltVar=(chv||[]).reduce((a,c)=>a+c.suma,0);}catch(e){}
  
  let cheltFix=0;
  try{const{data:chf}=await sb.from('cheltuieli_fixe').select('suma').eq('activa',true);cheltFix=(chf||[]).reduce((a,c)=>a+c.suma,0);}catch(e){}
  
  const totalChelt=cheltVar+cheltFix;
  const profit=incasari-totalChelt;
  const profitColor=profit>=0?'var(--green)':'var(--red)';
  
  const box=document.getElementById('rep-profit-box');
  if(box){
    box.innerHTML=`<div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem">
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:var(--text)"><span style="color:var(--text2)">Încasări</span><span style="color:var(--green)">+${incasari} lei</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:var(--text)"><span style="color:var(--text2)">Tips</span><span style="color:var(--green)">+${tips} lei</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:var(--text)"><span style="color:var(--text2)">Cheltuieli variabile</span><span style="color:var(--red)">-${cheltVar} lei</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:var(--text)"><span style="color:var(--text2)">Cheltuieli fixe (lunar)</span><span style="color:var(--red)">-${cheltFix} lei</span></div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:600;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:6px"><span>Profit net</span><span style="color:${profitColor}">${profit>=0?'+':''}${profit} lei</span></div>
    </div>`;
  }
}

// RAPOARTE
async function loadRapoarte(){
  const dates=getRepDates();if(!dates)return;
  const{s,e}=dates;
  const{data}=await sb.from('programari').select('*').eq('status','confirmat').gte('data',dk(s)).lte('data',dk(e));
  const rd=data||[];
  const total=rd.reduce((acc,p)=>acc+p.pret,0);
  const totalTips=rd.reduce((acc,p)=>acc+(p.tips||0),0);
  
  document.getElementById('rep-stats').innerHTML=
    `<div class="stat-card"><div class="stat-label">Încasări</div><div class="stat-value">${total} lei</div></div>`+
    `<div class="stat-card"><div class="stat-label">Programări</div><div class="stat-value">${rd.length}</div><div class="stat-sub">${rd.length>0?Math.round(total/rd.length)+' lei/medie':''}</div></div>`;
  
  // TIPS section
  const tipsMap={};
  rd.filter(p=>p.tips>0).forEach(p=>{
    if(!tipsMap[p.nume])tipsMap[p.nume]={total:0,cnt:0,maxTip:0};
    tipsMap[p.nume].total+=p.tips;
    tipsMap[p.nume].cnt++;
    tipsMap[p.nume].maxTip=Math.max(tipsMap[p.nume].maxTip,p.tips);
  });
  const tipsSorted=Object.entries(tipsMap).sort((a,b)=>b[1].total-a[1].total);
  const tipsEl=document.getElementById('rep-tips');
  if(totalTips>0){
    tipsEl.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px"><span style="color:var(--text2)">Total tips</span><span style="color:var(--green);font-weight:600">+${totalTips} lei</span></div>`+
    `<p style="font-size:12px;color:var(--text2);margin-bottom:8px">TOP clientă tips</p>`+
    tipsSorted.slice(0,5).map(([n,v],i)=>
      `<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text)">${i===0?'🥇 ':''}${n}</span>
        <span style="color:var(--amber)">${v.total} lei (max ${v.maxTip} lei)</span>
      </div>`).join('');
  } else {
    tipsEl.innerHTML=`<div style="font-size:13px;color:var(--text2)">Niciun tips înregistrat în această perioadă.</div>`;
  }
  
  const sm={};rd.forEach(p=>{if(!sm[p.serviciu])sm[p.serviciu]={cnt:0,total:0};sm[p.serviciu].cnt++;sm[p.serviciu].total+=p.pret;});
  document.getElementById('rep-servicii').innerHTML=Object.entries(sm).sort((a,b)=>b[1].cnt-a[1].cnt).map(([n,v])=>`<div class="report-row"><span>${n}</span><span>${v.cnt}x · ${v.total} lei</span></div>`).join('')||`<div style="color:var(--text2);font-size:14px">Nicio dată.</div>`;
  const cm={};rd.forEach(p=>{if(!cm[p.nume])cm[p.nume]={cnt:0,total:0};cm[p.nume].cnt++;cm[p.nume].total+=p.pret;});
  document.getElementById('rep-clienti').innerHTML=Object.entries(cm).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,10).map(([n,v])=>`<div class="report-row"><span>${n}</span><span>${v.cnt} prog · ${v.total} lei</span></div>`).join('')||`<div style="color:var(--text2);font-size:14px">Nicio dată.</div>`;
  
  await loadCheltuieli();
  await loadCheltuieliFixe();
  await updateProfit();
}

async function exportExcel(){
  const period=document.getElementById('rep-period').value;
  const now=new Date();let s,e;
  if(period==='azi'){s=new Date(now.getFullYear(),now.getMonth(),now.getDate());e=s;}
  else if(period==='saptamana'){s=getMonday(now);e=new Date(s);e.setDate(e.getDate()+6);}
  else if(period==='luna'){s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='luna-trecuta'){s=new Date(now.getFullYear(),now.getMonth()-1,1);e=new Date(now.getFullYear(),now.getMonth(),0);}
  else if(period==='an'){s=new Date(now.getFullYear(),0,1);e=new Date(now.getFullYear(),11,31);}
  else{s=new Date('2020-01-01');e=new Date('2099-12-31');}
  const{data}=await sb.from('programari').select('*').gte('data',dk(s)).lte('data',dk(e)).order('data').order('ora');
  if(!data||!data.length){alert('Nu există date.');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data.map(p=>({'Data':p.data,'Ora':p.ora,'Nume':p.nume,'Telefon':p.telefon,'Serviciu':p.serviciu,'Durată':durLabel(p.durata),'Preț (lei)':p.pret,'Status':p.status}))),'Programări');
  XLSX.writeFile(wb,`naomi-${period}-${new Date().toISOString().slice(0,10)}.xlsx`);
}

function openAddClientModal(){
  const o=document.createElement('div');o.className='overlay';o.id='add-client-overlay';
  o.innerHTML=`<div class="modal">
    <p class="modal-title">Client nou</p>
    <label>Nume și prenume</label>
    <input type="text" id="ac-name" placeholder="ex: Maria Popescu">
    <label>Număr de telefon</label>
    <input type="tel" id="ac-phone" placeholder="ex: 0712 345 678">
    <label>Email <span style="font-size:11px;color:var(--text2)">(opțional)</span></label>
    <input type="email" id="ac-email" placeholder="adresa@email.com">
    <label>Mențiuni <span style="font-size:11px;color:var(--text2)">(opțional)</span></label>
    <textarea id="ac-note" placeholder="ex: clientă nouă, recomandată de..."></textarea>
    <div id="ac-error" style="display:none;background:var(--red-light);color:var(--red);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:1rem"></div>
    <button class="btn" onclick="submitAddClient()">Salvează clienta</button>
    <button class="close-modal-btn" style="margin-top:8px" onclick="document.getElementById('add-client-overlay').remove();closeModal()">Anulează</button>
  </div>`;
  openModal();
  document.body.appendChild(o);
  o.addEventListener('click',e=>{if(e.target===o){o.remove();closeModal();}});
}

async function submitAddClient(){
  const name=document.getElementById('ac-name').value.trim();
  const phone=document.getElementById('ac-phone').value.trim().replace(/\s/g,'');
  const email=document.getElementById('ac-email').value.trim();
  const note=document.getElementById('ac-note').value.trim();
  const errEl=document.getElementById('ac-error');errEl.style.display='none';
  if(!name||!phone){errEl.textContent='Numele și telefonul sunt obligatorii.';errEl.style.display='block';return;}
  // Check if phone already exists
  const{data:existing}=await sb.from('profiles').select('id').eq('telefon',phone);
  if(existing&&existing.length>0){errEl.textContent='Există deja un profil cu acest număr de telefon.';errEl.style.display='block';return;}
  // Insert profile without auth user (admin-added client)
  const{error}=await sb.from('profiles').insert({
    id:crypto.randomUUID(),
    nume:name,
    telefon:phone,
    email:email||null,
    rol:'client'
  });
  if(error){errEl.textContent='Eroare: '+error.message;errEl.style.display='block';return;}
  // Save note if exists
  if(note){
    await sb.from('notite_clienti').insert({telefon:phone,nume_client:name,notita:note});
  }
  document.getElementById('add-client-overlay').remove();
  closeModal();
  showNotif('Clientă adăugată cu succes!','ok');
  loadClientList();
}
